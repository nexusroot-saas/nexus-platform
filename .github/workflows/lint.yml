name: Lint
on: [push, pull_request]
jobs:
   ## lint job to check code quality and style
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'  # ou sua versão
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
