services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-platform-postgres-1
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexusdevpass
      POSTGRES_DB: nexus_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexus -d nexus_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus-platform-redis-1
    ports:
      - '6379:6379'

volumes:
  postgres_data:
