- name: Start Test Postgres
  run: |
    docker-compose -f docker-compose.test.yml up -d postgres-test
    sleep 10  # Aguardar boot
    
- name: Run Migrations Test DB
  run: |
    npm run migrate:test  # psql -f migrations/*.sql
    
- name: Test RLS
  run: npm run test
  env:
    DB_HOST: localhost
    DB_PORT: 5433
    DB_NAME: nexus_test
    DB_USER: postgres
    DB_PASSWORD: test123
    
- name: Cleanup
  if: always()
  run: docker-compose -f docker-compose.test.yml down

