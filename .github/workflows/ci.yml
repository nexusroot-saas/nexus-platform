name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint, Test RLS, Apply Migrations
    runs-on: ubuntu-latest

    # Secrets do Supabase (adicionar em GitHub Settings > Secrets)
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: jvxjjezqevbbxsqxrofu # Seu projeto Supabase
      DATABASE_URL_TEST: postgresql://nexus:nexusdevpass@localhost:5432/nexusdev

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexusdevpass
          POSTGRES_DB: nexusdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Instalar dependências
      - name: Install dependencies
        run: npm ci

      # 4. ESLint + Prettier
      - name: Lint & Format
        run: |
          npm run lint
          npm run format:check

      # 5. Testes Jest + RLS
      - name: Run Tests
        run: |
          npm run test
          npm run test:rls
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}

      # 6. Setup Supabase CLI
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # 7. Aplicar Migrations (Local Test DB)
      - name: Apply migrations (Test DB)
        run: |
          npm run db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_TEST }}

      # 8. Push Migrations para Supabase PROD/STAGING
      - name: Apply migrations to Supabase
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}

      # 9. Build projeto
      - name: Build
        run: npm run build

  deploy-render:
    name: Trigger Render Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/srv-xxxxx/deploys
