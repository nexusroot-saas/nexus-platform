name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint, Test & RLS
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_dev_pass
          POSTGRES_DB: nexus_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ##

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/download/v1.181.0/supabase_linux_amd64.tar.gz | tar xz -C /usr/local/bin
          supabase --version

      - name: Apply migrations
        run: supabase db push --db-url $SUPABASE_DB_URL
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Create app user
        run: |
          psql -h localhost -U nexus -d nexus_dev -c "CREATE USER nexus_app WITH PASSWORD 'nexus_app_pass';"
          psql -h localhost -U nexus -d nexus_dev -c "GRANT CONNECT ON DATABASE nexus_dev TO nexus_app;"
          psql -h localhost -U nexus -d nexus_dev -c "GRANT USAGE ON SCHEMA public TO nexus_app;"
          psql -h localhost -U nexus -d nexus_dev -c "GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO nexus_app;"
        env:
          PGPASSWORD: nexus_dev_pass

      - name: Apply seed
        run: psql -h localhost -U nexus -d nexus_dev -f packages/database/seeds/dev-seed.sql
        env:
          PGPASSWORD: nexus_dev_pass

      - name: Run tests
        run: npm run test
