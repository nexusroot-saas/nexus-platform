name: Staging Deploy

on:
  push:
    branches: [develop]

jobs:
  staging:
    name: Lint, Test, Migrate, Deploy Staging
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexusdevpass
          POSTGRES_DB: nexusdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nexus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      PGUSER: nexus
      PGPASSWORD: nexusdevpass
      PGDATABASE: nexus_test
      PGHOST: 127.0.0.1
      PGPORT: 5432
      DATABASE_URL: postgresql://nexus:nexusdevpass@127.0.0.1:5432/nexus_test
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: jvxjjezqevbbxsqxrofu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Reset Test Database
        run: npm run db:reset:test

      - name: Run CI script (lint, format, test, build)
        run: npm run ci:test

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations (Test DB)
        run: npm run db:migrate

      - name: Deploy to Supabase Staging
        run: |
          supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }} --access-token ${{ env.SUPABASE_ACCESS_TOKEN }}
          supabase db push

      - name: Build
        run: npm run build

  deploy-render-staging:
    name: Trigger Render Deploy (Staging)
    needs: staging
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/srv-yyyyy/deploys
