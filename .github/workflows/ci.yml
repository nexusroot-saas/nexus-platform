name: CI/CD Nexus Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        
    - run: npm ci
    
    - run: npm run lint
    
    - name: Test RLS Local
      run: npm run test
      
    - name: Push Migrations Supabase
      if: github.ref == 'refs/heads/main'  # Só main
      run: |
        supabase db push \
          --db-url ${{ secrets.SUPABASE_DB_URL }} \
          --include-roles \
          --include-seed
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
